name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install backend dependencies
      run: npm install

    - name: Install frontend dependencies
      run: cd urlshortenerNewUiV1 && npm install

    - name: Build frontend
      run: cd urlshortenerNewUiV1 && npm run build
      env:
        VITE_AMPLITUDE_API_KEY: 4856f30af2b3945a8d260c4136ea7cd9

    - name: Run backend tests (if available)
      run: npm test || echo "No tests configured"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        cd urlshortenerNewUiV1 && npm install

    - name: Build frontend
      run: cd urlshortenerNewUiV1 && npm run build
      env:
        VITE_API_URL: https://snip.sa/api
        REACT_APP_DEFAULT_DOMAIN: snip.sa
        VITE_AMPLITUDE_API_KEY: 4856f30af2b3945a8d260c4136ea7cd9

    - name: Create deployment package
      run: |
        mkdir -p deploy-temp/frontend
        cp -r src deploy-temp/
        cp -r scripts deploy-temp/
        cp -r urlshortenerNewUiV1/dist deploy-temp/frontend/
        cp package*.json deploy-temp/
        mkdir -p deploy-temp/logs
        # Copy GA credentials if present
        if [ -f src/config/ga-credentials.json ]; then
          mkdir -p deploy-temp/src/config
          cp src/config/ga-credentials.json deploy-temp/src/config/
        fi
        tar -czf deployment.tar.gz -C deploy-temp .

    - name: Copy files to VM
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PROD_VM_HOST }}
        username: ${{ secrets.PROD_VM_USERNAME }}
        key: ${{ secrets.PROD_VM_SSH_KEY }}
        port: 22
        source: "deployment.tar.gz"
        target: "/tmp/"

    - name: Deploy on VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PROD_VM_HOST }}
        username: ${{ secrets.PROD_VM_USERNAME }}
        key: ${{ secrets.PROD_VM_SSH_KEY }}
        port: 22
        script: |
          set -e

          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"
          export PATH="$HOME/.nvm/versions/node/v18.20.8/bin:$PATH"

          APP_DIR="$HOME/url-shortener"

          # Stop app gracefully
          pm2 stop url-shortener || true

          # Extract new deployment (preserves .env and ecosystem.config.js)
          tar -xzf /tmp/deployment.tar.gz -C "$APP_DIR"

          # Install production dependencies
          cd "$APP_DIR"
          npm install --production

          # Restart backend
          pm2 restart url-shortener || pm2 start ecosystem.config.js --env production

          # Restart frontend serve
          pm2 delete url-shortener-ui || true
          pm2 serve frontend/dist 3016 --name url-shortener-ui --spa

          # Save PM2 state
          pm2 save --force

          # Cleanup
          rm -f /tmp/deployment.tar.gz

          echo "Deployment complete. Commit: ${{ github.sha }}"
