name: Deploy to Production

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd urlshortenerNewUiV1 && npm install

      - name: Build frontend
        run: cd urlshortenerNewUiV1 && npm run build
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
          REACT_APP_DEFAULT_DOMAIN: ${{ secrets.PROD_DOMAIN }}

      - name: Create deployment package
        run: |
          mkdir -p deploy-temp/frontend
          cp -r src deploy-temp/
          cp -r scripts deploy-temp/
          cp -r urlshortenerNewUiV1/dist deploy-temp/frontend/
          cp package*.json deploy-temp/
          mkdir -p deploy-temp/logs
          if [ -f src/config/ga-credentials.json ]; then
            mkdir -p deploy-temp/src/config
            cp src/config/ga-credentials.json deploy-temp/src/config/
          fi
          tar -czf deployment.tar.gz -C deploy-temp .

      - name: Copy deployment package to Production VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          source: "deployment.tar.gz"
          target: "/tmp/"

      - name: Deploy on Production VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            nvm use 18 || nvm use default

            APP_DIR="$HOME/url-shortener"

            # Ensure app directory exists (safe on first deploy)
            mkdir -p "$APP_DIR/logs" "$APP_DIR/frontend"

            # Stop app gracefully
            pm2 stop url-shortener || true

            # Extract new deployment (preserves .env and ecosystem.config.js on server)
            tar -xzf /tmp/deployment.tar.gz -C "$APP_DIR"

            # Install production dependencies
            cd "$APP_DIR"
            npm install --production

            # Restart backend
            pm2 restart url-shortener || pm2 start ecosystem.config.js --env production

            # Serve frontend build
            pm2 delete url-shortener-ui || true
            pm2 serve frontend/dist 3021 --name url-shortener-ui --spa

            # Save PM2 state
            pm2 save --force

            # Cleanup
            rm -f /tmp/deployment.tar.gz

            echo "Production deployment complete. Commit: ${{ github.sha }}"
